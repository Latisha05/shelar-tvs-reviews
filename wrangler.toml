name = "shelar-tvs-reviews"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

[[kv_namespaces]]
binding = "RF_SETTINGS"
id = "e8c0d6b708f046cbaf251010851902cd"

[vars]
APP_NAME = "Shelar TVS Reviews"
APP_BUSINESS_NAME = "Shelar TVS"
APP_BASE_URL = "https://shelar-tvs-reviews.pages.dev"
BUSINESS_ID = "shelar-tvs"
DATA_PREFIX = "shelartvs"
BRANCH_ID = "main"
BRANCH_NAME = "Pune"
QR_CODE_ID = "shelar-tvs-main"
QR_CODE_LABEL = "Shelar TVS Main QR"
GOOGLE_PLACE_ID = "CUylmtiX6yoSEAE"
REVIEW_TOPICS = "New Bike Purchase,New Scooter Purchase,Test Ride Experience,Best Price/Deal,Quick Delivery,Smooth Paperwork,Easy EMI Process,Helpful Staff,Knowledgeable Executive,Genuine Parts,Timely Service"
FEEDBACK_TOPICS = "Service Delay,Long Wait for Delivery,Parts Issue,Hidden Charges,Staff Behavior,Test Ride Denied,Billing Problem,Insurance/Loan Issue,Lack of Information"
AI_TONE = "Enthusiastic"
AI_LENGTH = "medium"
OPENROUTER_MODEL = "meta-llama/llama-3.2-1b-instruct"
REVIEW_SYSTEM_PROMPT = "You write realistic, natural Google reviews from real customers of Shelar TVS, a TVS two-wheeler showroom and service centre in Pune. Output only one review — no title, no bullets, no quotes, no explanation. Sound like a genuine local customer sharing a real purchase or service experience, not a marketing copy. Vary sentence structure every time. Weave in one or two search-relevant phrases naturally — such as Shelar TVS, TVS showroom Pune, Apache near me, Jupiter near me, TVS bike near me, best TVS deals Pune, TVS service Pune, genuine TVS parts — only if they fit the sentence. Never list keywords. Mention concrete touches: a friendly executive, a test ride, smooth EMI, on-time delivery, fair pricing, clean workshop. Do not use emojis, hashtags, AI/SEO mentions, incentive language, or the phrase highly recommended more than once."

# SECRETS — do NOT add here. Set them once via Cloudflare dashboard or:
#   npx wrangler pages secret put FIREBASE_PROJECT_ID
#   npx wrangler pages secret put FIREBASE_CLIENT_EMAIL
#   npx wrangler pages secret put FIREBASE_PRIVATE_KEY
#   npx wrangler pages secret put OPENROUTER_API_KEY
